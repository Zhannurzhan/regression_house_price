name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-north-1
  AWS_ACCOUNT_ID: "229475224700"
  API_REPOSITORY: housing-api
  STREAMLIT_REPOSITORY: housing-streamlit
  ECS_CLUSTER: housing-regression-cluster
  API_SERVICE: housing-api-service
  STREAMLIT_SERVICE: housing-streamlit-service

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Build API Docker image
        run: docker build -t housing-api-ci -f Dockerfile .

      - name: Smoke test API container
        run: |
          docker run -d --name housing-api-ci -p 8000:8000 -e DISABLE_S3_DOWNLOAD=1 housing-api-ci
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/health; then
              docker rm -f housing-api-ci
              exit 0
            fi
            docker ps -a
            docker logs housing-api-ci || true
            sleep 2
          done
          docker logs housing-api-ci || true
          docker rm -f housing-api-ci
          exit 1

      - name: Build Streamlit Docker image
        run: docker build -t housing-streamlit-ci -f Dockerfile.streamlit .

      - name: Smoke test Streamlit container
        run: |
          docker run -d --name housing-streamlit-ci -p 8501:8501 -e API_URL=http://localhost:8000/predict housing-streamlit-ci
          for i in {1..45}; do
            if curl --fail --silent http://localhost:8501/dashboard/_stcore/health; then
              docker rm -f housing-streamlit-ci
              exit 0
            fi
            docker ps -a
            docker logs housing-streamlit-ci || true
            sleep 2
          done
          docker logs housing-streamlit-ci || true
          docker rm -f housing-streamlit-ci
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        run: |
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t ${ECR_REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG} -f Dockerfile .
          docker tag ${ECR_REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${API_REPOSITORY}:latest
          docker push ${ECR_REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${API_REPOSITORY}:latest

      - name: Build, tag, and push Streamlit image
        run: |
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:${IMAGE_TAG} -f Dockerfile.streamlit .
          docker tag ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:latest
          docker push ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:latest

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${API_SERVICE} \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER} \
            --services ${API_SERVICE}

      - name: Deploy Streamlit service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${STREAMLIT_SERVICE} \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER} \
            --services ${STREAMLIT_SERVICE}
