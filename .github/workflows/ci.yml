name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Build API Docker image
        run: docker build -t housing-api-ci -f Dockerfile .

      - name: Smoke test API container
        run: |
          docker run -d --name housing-api-ci -p 8000:8000 -e DISABLE_S3_DOWNLOAD=1 housing-api-ci
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8000/health; then
              docker rm -f housing-api-ci
              exit 0
            fi
            docker ps -a
            docker logs housing-api-ci || true
            sleep 2
          done
          docker logs housing-api-ci || true
          docker rm -f housing-api-ci
          exit 1

      - name: Build Streamlit Docker image
        run: docker build -t housing-streamlit-ci -f Dockerfile.streamlit .

      - name: Smoke test Streamlit container
        run: |
          docker run -d --name housing-streamlit-ci -p 8501:8501 -e API_URL=http://localhost:8000/predict housing-streamlit-ci
          for i in {1..45}; do
            if curl --fail --silent http://localhost:8501/dashboard/_stcore/health; then
              docker rm -f housing-streamlit-ci
              exit 0
            fi
            docker ps -a
            docker logs housing-streamlit-ci || true
            sleep 2
          done
          docker logs housing-streamlit-ci || true
          docker rm -f housing-streamlit-ci
          exit 1
