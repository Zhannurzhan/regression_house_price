name: Build, Push, and Deploy to ECS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-ecr.yml"
      - "Dockerfile"
      - "Dockerfile.streamlit"
      - "app.py"
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"

env:
  AWS_REGION: eu-north-1
  AWS_ACCOUNT_ID: "229475224700"
  API_REPOSITORY: housing-api
  STREAMLIT_REPOSITORY: housing-streamlit
  ECS_CLUSTER: housing-regression-cluster
  API_SERVICE: housing-api-service
  STREAMLIT_SERVICE: housing-streamlit-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push API image
        run: |
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t ${ECR_REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG} -f Dockerfile .
          docker tag ${ECR_REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${API_REPOSITORY}:latest
          docker push ${ECR_REGISTRY}/${API_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${API_REPOSITORY}:latest

      - name: Build, tag, and push Streamlit image
        run: |
          ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:${IMAGE_TAG} -f Dockerfile.streamlit .
          docker tag ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:${IMAGE_TAG} ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:latest
          docker push ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${STREAMLIT_REPOSITORY}:latest

      - name: Deploy API service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${API_SERVICE} \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER} \
            --services ${API_SERVICE}

      - name: Deploy Streamlit service
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${STREAMLIT_SERVICE} \
            --force-new-deployment
          aws ecs wait services-stable \
            --cluster ${ECS_CLUSTER} \
            --services ${STREAMLIT_SERVICE}
